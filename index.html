<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nodo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-color: #F6F3EE;
  color: #3a3a3a;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  font-size: 13px;
}

.logo {
  font-family: 'Playfair Display', serif;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 140px 20px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
}

.hero p {
  font-size: 13px;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  border-bottom: 1px solid #3a3a3a;
  text-decoration: none;
  color: inherit;
}

/* IMAGEN GRANDE */
.image-block {
  width: 100%;
  height: 400px;
  background: #ddd;
  margin: 40px 0;
}

/* ABOUT */
.about {
  text-align: center;
  max-width: 500px;
  margin: auto;
  font-size: 14px;
  line-height: 1.6;
}

/* PRODUCTOS */
.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 40px;
}

.product img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  background: #eee;
}

.product p {
  font-size: 13px;
  margin-top: 8px;
}

/* CONTACTO */
.contact {
  text-align: center;
  padding: 80px 20px;
  font-size: 14px;
}

footer {
  text-align: center;
  font-size: 12px;
  padding: 40px;
  color: #777;
}

</style>
</head>

<body>

<header>
  <div class="logo">nodo</div>
  <div>menu</div>
</header>

<section class="hero">
  <h1>básicos con intención</h1>
  <p>cada puntada cuenta</p>
  <a class="btn" href="https://tu-tienda-nube.com">ver tienda</a>
</section>

<div class="image-block"></div>

<section class="about">
  <p>
    Nodo nace de lo simple.  
    Creamos prendas que acompañan lo cotidiano, con intención en cada detalle.
  </p>
</section>

<section class="products">
  <div class="product">
    <img src="">
    <p>remera algodón natural</p>
  </div>

  <div class="product">
    <img src="">
    <p>remera básica</p>
  </div>
</section>

<section class="contact">
  <p>@nodobasicos</p>
</section>

<footer>
  nodo © 2026
</footer>

</body>
</html>
